<!DOCTYPE html>
<html lang="pt">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>BoviWatch — Digital Twin · Bem-Estar Animal</title>

  <!-- ✅ CORRIGIDO -->
  <link rel="stylesheet" href="style.css">

  <script src="https://cdnjs.cloudflare.com/ajax/libs/Chart.js/4.4.0/chart.umd.min.js"></script>
  <script src="https://cdnjs.cloudflare.com/ajax/libs/d3/7.8.5/d3.min.js"></script>
  <script src="https://cdn.jsdelivr.net/npm/topojson-client@3/dist/topojson-client.min.js"></script>
</head>
<body>

<div class="app-wrapper">

  <!-- TOPBAR -->
  <div class="topbar">
    <div class="topbar-left">
      <div class="logo">Bovi<span>Watch</span></div>
      <div class="tagline">Digital Twin · Monitoramento Preditivo de Gado Leiteiro</div>
    </div>
    <div class="topbar-right">
      <div class="live-indicator"><div class="live-dot"></div>Tempo real</div>
      <div class="topbar-metrics" id="topMetrics"></div>
    </div>
  </div>

  <!-- MAIN NAV -->
  <div class="main-nav">
    <button class="nav-btn active" onclick="showSection('mapa',this)">🗺 Mapa Global</button>
    <button class="nav-btn" onclick="showSection('rebanho',this)">🐄 Rebanho</button>
    <button class="nav-btn" onclick="showSection('graficos',this)">📊 Gráficos</button>
    <button class="nav-btn" onclick="showSection('alertas',this)">🔔 Alertas</button>
    <button class="nav-btn" onclick="showSection('modulos',this)">⚙️ Módulos</button>
    <button class="nav-btn" onclick="showSection('motor',this)">🧠 Motor Preditivo</button>
  </div>

  <!-- SECTIONS -->
  <div class="sections">
    <div id="section-mapa" class="section active">
      <div class="map-layout">
        <div class="map-container">
          <svg id="worldMap" width="100%" height="100%" viewBox="0 0 900 500"></svg>
          <div class="map-overlay-title">BoviWatch · Rede de Fazendas Monitoradas</div>
        </div>
      </div>
    </div>
  </div>

</div>

<!-- MODAL -->
<div class="modal-overlay" id="addModal" style="display:none;">
  <div class="modal">
    <div class="modal-header">
      <div class="modal-title">Cadastrar Novo Animal</div>
      <button onclick="closeAddModal()">✕</button>
    </div>
  </div>
</div>

<!-- ✅ TODOS OS SCRIPTS CORRIGIDOS -->
<script src="animals.js"></script>
<script src="farms.js"></script>
<script src="modules.js"></script>

<script src="predictor.js"></script>
<script src="map.js"></script>
<script src="charts.js"></script>
<script src="alerts.js"></script>
<script src="app.js"></script>

</body>
</html>
