<!DOCTYPE html>
<html lang="pt">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>BoviWatch — Digital Twin</title>
  
  <link rel="stylesheet" href="css/style.css">
  
  <script src="https://cdnjs.cloudflare.com/ajax/libs/Chart.js/4.4.0/chart.umd.min.js"></script>
  <script src="https://cdnjs.cloudflare.com/ajax/libs/d3/7.8.5/d3.min.js"></script>
  <script src="https://cdn.jsdelivr.net/npm/topojson-client@3/dist/topojson-client.min.js"></script>
  
  <script src="data/farms.js"></script>
  <script src="data/animals.js"></script>
  <script src="data/modules.js"></script>
  
  <script src="js/predictor.js"></script>
  <script src="js/map.js"></script>
  <script src="js/charts.js"></script>
  <script src="js/alerts.js"></script>
  <script src="js/app.js"></script>
</head>
<body>
  <!-- Todo o conteúdo HTML que você já tinha -->
  <!-- (vou te dar a versão limpa e funcional abaixo) -->

  <div class="topbar">
    <div class="topbar-left">
      <div class="logo">Bovi<span>Watch</span></div>
      <div class="tagline">Digital Twin · Monitoramento Preditivo de Gado Leiteiro</div>
    </div>
    <div class="topbar-right">
      <div class="live-indicator"><div class="live-dot"></div>Tempo real</div>
      <div class="topbar-metrics" id="topMetrics"></div>
    </div>
  </div>

  <div class="main-nav">
    <button class="nav-btn active" onclick="showSection('mapa',this)">🗺 Mapa Global</button>
    <button class="nav-btn" onclick="showSection('rebanho',this)">🐄 Rebanho</button>
    <button class="nav-btn" onclick="showSection('graficos',this)">📊 Gráficos</button>
    <button class="nav-btn" onclick="showSection('alertas',this)">🔔 Alertas</button>
    <button class="nav-btn" onclick="showSection('modulos',this)">⚙️ Módulos</button>
    <button class="nav-btn" onclick="showSection('motor',this)">🧠 Motor Preditivo</button>
  </div>

  <div class="sections">
    <div id="section-mapa" class="section active"> ... (conteúdo do mapa) </div>
    <!-- Outras seções podem ser adicionadas depois -->
  </div>

  <script>
    // Inicialização
    document.addEventListener('DOMContentLoaded', () => {
      renderTopMetrics();
      renderAnimalGrid();
      MapModule.init();
      AlertsModule.render();
      // etc...
    });
  </script>
</body>
</html>
